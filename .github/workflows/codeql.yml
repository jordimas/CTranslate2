name: CodeQL

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: "24 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: c-cpp
            build-mode: manual
          - language: python
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Configure C++
        if: matrix.language == 'c-cpp'
        run: |
          cmake -S . -B build-codeql \
            -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
            -DWITH_MKL=OFF \
            -DOPENMP_RUNTIME=NONE \
            -DBUILD_CLI=OFF \
            -DBUILD_TESTS=OFF

      - name: Build C++
        if: matrix.language == 'c-cpp'
        run: cmake --build build-codeql --parallel $(nproc) --target ctranslate2

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
